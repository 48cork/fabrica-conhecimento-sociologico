name: fabrica-de-conhecimento-sociologico
version: 1.0.0
description: >
  Squad de agentes sociologicos com Weber, Marx, Durkheim, Bourdieu e
  Ghiraldelli para criar aulas criativas e extrair o maximo dos teoricos
  para entender a sociedade de plataformas
author: Sergio Farias
license: MIT
slashPrefix: fabrica-soc

aiox:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - example-agent.md
    - weber.md
    - marx.md
    - durkheim.md
    - bourdieu.md
    - ghiraldelli.md
  tasks:
    - example-agent-task.md
  workflows: []
  checklists: []
  templates: []
  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md

dependencies:
  node: []
  python: []
  squads: []

tags:
  - sociologia
  - educacao
  - teoria-social
  - plataformas-digitais
  - aulas-criativas
